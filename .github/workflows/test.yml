name: Run Fedora dotfiles container using nerdctl

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
  pull_request: {}


jobs:
  test-nerdctl-fedora:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Enable linger and create user session (workaround)
        uses: gbraad-actions/blacksmith-user-session@main  
      
      - name: Allow unprivileged userns (workaround)
        uses: gbraad-actions/warpbuild-unprivileged-userns@main

      - name: Remove unwanted stuff
        if: ${{ inputs.cleanup  }}
        uses: gbraad-actions/remove-unwanted@v1

      - name: Change containers storage
        uses: gbraad-actions/change-containers-storage@v1

      - name: Get last 3 chars of hostname
        id: runner_id
        run: |
          echo "last3=${HOSTNAME: -3}" >> $GITHUB_OUTPUT

      - name: Tailscale
        uses: gbraad-actions/tailscale-action@v1
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          args: --ssh --accept-dns=false --operator=runner --advertise-exit-node
          hostname: "dotfiles-${{ steps.runner_id.outputs.last3 }}"

      - name: Create and share userdirs
        run: |
          cd ${{ github.workspace }}
          mkdir -p Projects Documents Downloads
          ln -s ${{ github.workspace }}/Projects  ${HOME}/Projects
          ln -s ${{ github.workspace }}/Documents ${HOME}/Documents
          ln -s ${{ github.workspace }}/Downloads ${HOME}/Downloads
          tailscale drive share projects ${HOME}/Projects
          tailscale drive share documents ${HOME}/Documents
          tailscale drive share downloads ${HOME}/Downloads

      - name: Dotfiles (install from action)
        uses: gbraad-dotfiles/install-action@main
        with:
          upstream: true

      - name: Install nerdctl
        uses: gbraad-actions/setup-container-tools@v2
        with:
          runtime: containerd

      - name: Set containerd as runtime for devenv
        uses: gbraad-dotfiles/dotini-action@main
        with:
          inifile: devenv
          args: devenv.runtime "nerdctl"

      - name: Start Fedora container image
        uses: gbraad-dotfiles/devenv-action@main
        with:
          prefix: dotfedora
          command: start

      - name: Install Apache
        uses: gbraad-dotfiles/devenv-action@main
        with:
          prefix: dotfedora
          command: sudo dnf install -y httpd

      - name: Enable Apache service
        uses: gbraad-dotfiles/devenv-action@main
        with:
          prefix: dotfedora
          command: sudo systemctl enable --now httpd

      - name: Verify status
        uses: gbraad-dotfiles/devenv-action@main
        with:
          prefix: dotfedora
          command: systemctl status

      - name: Hang around
        if: failure()
        run: |
          IP=`tailscale ip -4`
          echo "Use the following command to connect \`tailscale ssh runner@${IP}\` or \`rscreen runner@${IP}\`"
          sleep 18000
